<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Red Rush</title>
  <link rel="stylesheet" href="../assets/style/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

  <header>
    <nav class="nave">
      <img class="logo" src="../assets/imag/Logo_red_rush.png" alt="Red Rush Logo">
      <h1>Red Rush</h1>
      <p>Cadastrar conta</p>
    </nav>
  </header>

  <main>
    <div class="container">
      <form class="formss" action="/login" method="POST">
        <h2 id="log">Login</h2>
        <label for="email">Email</label>
        <br>
        <input type="email" id="email" name="email" required>
        <br>
        <label for="password">Senha</label>
        <br>
        <input type="password" id="password" name="password" required>
        <br>
        <div class="check">
          <input type="checkbox" name="check" id="checks">
          <label for="checkbox">Lembrar de mim</label>
        </div>
        <button id="bot" type="submit">Login</button>
      </form>
    </div>
  </main>

  <footer>

  </footer>
</body>

</html>
